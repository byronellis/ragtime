# Block dangerous shell commands regardless of context.
name: block-dangerous-commands
match:
  event: pre-tool-use
  tool: Bash
actions:
  - type: starlark
    script: |
      cmd = event.tool_input.get("command", "")
      dangerous = ["rm -rf", "git push --force", "DROP TABLE", "docker rm"]
      for pattern in dangerous:
          if pattern in cmd:
              log("BLOCKED:", cmd)
              response.deny("Command contains dangerous pattern: " + pattern)
              break
