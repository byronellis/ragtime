<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ragtime</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#3c3836">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg0:     #1d2021;
      --bg1:     #282828;
      --bg2:     #3c3836;
      --bg3:     #504945;
      --fg:      #ebdbb2;
      --fg2:     #d5c4a1;
      --dim:     #928374;
      --green:   #b8bb26;
      --red:     #fb4934;
      --yellow:  #fabd2f;
      --blue:    #83a598;
      --cyan:    #8ec07c;
      --purple:  #d3869b;
      --orange:  #fe8019;
    }

    html, body { height: 100%; background: var(--bg0); color: var(--fg); font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace; font-size: 12px; line-height: 1.5; }

    /* Layout */
    body {
      display: grid;
      grid-template-rows: 28px 1fr;
      grid-template-columns: 1fr 240px;
      grid-template-areas: "header header" "feed sidebar";
      height: 100vh;
      overflow: hidden;
    }

    /* Header */
    #header {
      grid-area: header;
      background: var(--bg2);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 10px;
      border-bottom: 1px solid var(--bg3);
      font-size: 11px;
    }
    .logo { color: var(--blue); font-weight: bold; font-size: 13px; letter-spacing: 1px; }
    .status-dot { font-size: 10px; }
    .status-dot.connected    { color: var(--green); }
    .status-dot.disconnected { color: var(--red); }
    #header-info { color: var(--dim); flex: 1; }
    #notify-btn {
      background: none; border: 1px solid var(--bg3); color: var(--dim);
      padding: 1px 6px; cursor: pointer; border-radius: 2px; font-size: 10px;
      font-family: inherit;
    }
    #notify-btn:hover { border-color: var(--blue); color: var(--blue); }
    #notify-btn.hidden { display: none; }

    /* Event feed */
    #feed {
      grid-area: feed;
      overflow-y: auto;
      padding: 4px 0;
      border-right: 1px solid var(--bg3);
    }
    .event-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      padding: 1px 8px;
      white-space: nowrap;
      overflow: hidden;
    }
    .event-row:hover { background: var(--bg1); }
    .event-time { color: var(--dim); min-width: 60px; }
    .event-tag  { font-weight: bold; min-width: 32px; text-align: right; font-size: 10px; }
    .event-tag.pre  { color: var(--dim); }
    .event-tag.post { color: var(--dim); }
    .event-tag.stop { color: var(--purple); }
    .event-tag.perm { color: var(--yellow); }
    .event-tag.sess { color: var(--green); }
    .event-tag.notf { color: var(--blue); }
    .event-tag.sub  { color: var(--purple); }
    .event-tag.usr  { color: var(--cyan); }
    .event-tool   { color: var(--blue); min-width: 60px; overflow: hidden; text-overflow: ellipsis; }
    .event-detail { color: var(--fg2); overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .event-decision { font-size: 10px; padding: 0 4px; border-radius: 2px; margin-left: 4px; }
    .event-decision.allow { background: var(--green); color: var(--bg0); }
    .event-decision.deny  { background: var(--red);   color: var(--bg0); }

    /* Sidebar */
    #sidebar {
      grid-area: sidebar;
      overflow-y: auto;
      padding: 6px;
    }
    .sidebar-header { color: var(--dim); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; padding: 2px 2px 4px; border-bottom: 1px solid var(--bg3); margin-bottom: 4px; }
    .session-row {
      padding: 3px 4px;
      border-radius: 2px;
      cursor: pointer;
      margin-bottom: 2px;
    }
    .session-row:hover { background: var(--bg2); }
    .sess-agent  { color: var(--cyan); font-size: 10px; }
    .sess-id     { color: var(--dim); font-size: 10px; }
    .sess-meta   { color: var(--dim); font-size: 10px; display: flex; gap: 8px; }
    .sess-count  { color: var(--fg2); }

    /* Search bar */
    #search-bar {
      position: fixed;
      top: 50px;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      background: var(--bg1);
      border: 1px solid var(--blue);
      border-radius: 4px;
      padding: 8px 12px;
      display: none;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    #search-bar.visible { display: block; }
    #search-input {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--bg3);
      color: var(--fg);
      padding: 4px 8px;
      font-family: inherit;
      font-size: 12px;
      border-radius: 2px;
      outline: none;
    }
    #search-input:focus { border-color: var(--blue); }
    #search-results { margin-top: 8px; max-height: 300px; overflow-y: auto; }
    .search-result { padding: 6px; border-bottom: 1px solid var(--bg3); }
    .search-result:last-child { border-bottom: none; }
    .search-score { color: var(--dim); font-size: 10px; }
    .search-source { color: var(--blue); font-size: 10px; }
    .search-content { color: var(--fg2); margin-top: 2px; font-size: 11px; white-space: pre-wrap; word-break: break-word; }
    #search-hint { color: var(--dim); font-size: 10px; margin-top: 4px; }

    /* Interaction modal */
    #modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    #modal-overlay.visible { display: flex; }
    #modal {
      background: var(--bg1);
      border: 1px solid var(--blue);
      border-radius: 6px;
      padding: 20px 24px;
      width: min(560px, 90vw);
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    #modal-title { color: var(--blue); font-weight: bold; font-size: 14px; margin-bottom: 12px; }
    #modal-body {
      color: var(--fg);
      margin-bottom: 16px;
      line-height: 1.6;
    }
    #modal-body h1, #modal-body h2 { color: var(--blue); margin-bottom: 6px; font-size: 13px; }
    #modal-body h3 { color: var(--cyan); margin-bottom: 4px; font-size: 12px; }
    #modal-body strong { color: var(--fg); font-weight: bold; }
    #modal-body code { color: var(--cyan); background: var(--bg2); padding: 0 3px; border-radius: 2px; }
    #modal-body pre { background: var(--bg2); padding: 8px; border-radius: 3px; overflow-x: auto; margin: 6px 0; }
    #modal-body pre code { background: none; padding: 0; }
    #modal-input {
      width: 100%; background: var(--bg2); border: 1px solid var(--bg3);
      color: var(--fg); padding: 4px 8px; font-family: inherit; font-size: 12px;
      border-radius: 2px; outline: none; margin-bottom: 12px; display: none;
    }
    #modal-input:focus { border-color: var(--blue); }
    #modal-buttons { display: flex; gap: 8px; margin-bottom: 12px; }
    .modal-btn {
      padding: 4px 16px; cursor: pointer; border-radius: 3px; font-family: inherit;
      font-size: 12px; border: 1px solid var(--bg3); background: var(--bg2); color: var(--dim);
    }
    .modal-btn:hover { border-color: var(--blue); color: var(--fg); }
    .modal-btn.primary { border-color: var(--green); color: var(--green); }
    .modal-btn.primary:hover { background: var(--green); color: var(--bg0); }
    .modal-btn.danger  { border-color: var(--red); color: var(--red); }
    .modal-btn.danger:hover  { background: var(--red); color: var(--bg0); }
    #modal-timer { color: var(--yellow); font-size: 11px; font-style: italic; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg0); }
    ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--dim); }
  </style>
</head>
<body>

<header id="header">
  <span class="logo">ragtime</span>
  <span class="status-dot disconnected" id="status-dot">●</span>
  <span id="status-text" style="color:var(--dim)">connecting…</span>
  <span id="header-info"></span>
  <button id="notify-btn" onclick="requestNotifications()">Enable Notifications</button>
</header>

<main id="feed"></main>

<aside id="sidebar">
  <div class="sidebar-header">Sessions</div>
  <div id="sessions-list"></div>
  <div id="no-sessions" style="color:var(--dim);font-size:10px;padding:4px 2px">No active sessions</div>
</aside>

<!-- Search overlay -->
<div id="search-bar">
  <input id="search-input" type="text" placeholder="search sessions… (Enter to search, Esc to close)">
  <div id="search-results"></div>
  <div id="search-hint">/ to open · esc to close</div>
</div>

<!-- Interaction modal -->
<div id="modal-overlay">
  <div id="modal">
    <div id="modal-title">Interaction Required</div>
    <div id="modal-body"></div>
    <input id="modal-input" type="text" placeholder="Type your response…">
    <div id="modal-buttons"></div>
    <div id="modal-timer"></div>
  </div>
</div>

<script>
'use strict';

// ─── State ────────────────────────────────────────────────────────────────────
const MAX_EVENTS = 500;
let eventLog = [];
let autoScroll = true;
let activeInteraction = null;
let countdownTimer = null;
let searchVisible = false;

// ─── SSE Connection ───────────────────────────────────────────────────────────
let es;

function connect() {
  es = new EventSource('/api/events');

  es.addEventListener('connected', e => {
    const snap = JSON.parse(e.data);
    setConnected(true);
    renderDaemonInfo(snap.daemon_info);
    if (snap.sessions) renderSessions(snap.sessions);
  });

  es.addEventListener('hook_event', e => {
    const ev = JSON.parse(e.data);
    pushEvent(ev.event, new Date(ev.timestamp));
  });

  es.addEventListener('session_update', e => {
    const ev = JSON.parse(e.data);
    if (ev.session) updateSession(ev.session);
  });

  es.addEventListener('interaction_request', e => {
    const ev = JSON.parse(e.data);
    if (ev.interaction) showInteraction(ev.interaction);
  });

  es.onerror = () => {
    setConnected(false);
    // EventSource reconnects automatically
  };
}

function setConnected(connected) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  dot.className = 'status-dot ' + (connected ? 'connected' : 'disconnected');
  txt.textContent = connected ? 'connected' : 'reconnecting…';
  txt.style.color = connected ? 'var(--green)' : 'var(--red)';
}

// ─── Event Feed ───────────────────────────────────────────────────────────────
function pushEvent(event, ts) {
  if (!event) return;
  eventLog.push({ event, ts });
  if (eventLog.length > MAX_EVENTS) eventLog.shift();

  const row = buildEventRow(event, ts);
  const feed = document.getElementById('feed');
  feed.appendChild(row);

  if (autoScroll) feed.scrollTop = feed.scrollHeight;
}

const TAG_MAP = {
  'pre-tool-use':       ['PRE',  'pre'],
  'post-tool-use':      ['POST', 'post'],
  'stop':               ['STOP', 'stop'],
  'subagent-stop':      ['SUB',  'sub'],
  'permission-request': ['PERM', 'perm'],
  'session-start':      ['SESS', 'sess'],
  'notification':       ['NOTF', 'notf'],
  'user-prompt-submit': ['USR',  'usr'],
};

function buildEventRow(event, ts) {
  const row = document.createElement('div');
  row.className = 'event-row';

  const [tag, cls] = TAG_MAP[event.event_type] || [event.event_type.slice(0,4).toUpperCase(), 'pre'];

  const time   = el('span', 'event-time', fmtTime(ts));
  const tagEl  = el('span', 'event-tag ' + cls, tag);
  const tool   = el('span', 'event-tool', event.tool_name || '');
  const detail = el('span', 'event-detail', event.cwd ? shortPath(event.cwd) : '');

  row.append(time, tagEl, tool, detail);

  return row;
}

// ─── Sessions Sidebar ─────────────────────────────────────────────────────────
let sessions = {};

function renderSessions(list) {
  if (!list) return;
  sessions = {};
  list.forEach(s => { sessions[s.session_id] = s; });
  redrawSidebar();
}

function updateSession(s) {
  sessions[s.session_id] = s;
  redrawSidebar();
}

function redrawSidebar() {
  const list = document.getElementById('sessions-list');
  const none = document.getElementById('no-sessions');
  list.innerHTML = '';

  const keys = Object.keys(sessions);
  none.style.display = keys.length ? 'none' : 'block';

  keys.forEach(id => {
    const s = sessions[id];
    const row = document.createElement('div');
    row.className = 'session-row';
    row.title = s.session_id;

    const top = el('div', '', '');
    top.append(
      el('span', 'sess-agent', s.agent + ' '),
      el('span', 'sess-id', s.session_id.slice(0, 8) + '…')
    );

    const meta = el('div', 'sess-meta', '');
    meta.append(
      el('span', 'sess-count', s.event_count + ' events'),
      el('span', '', s.started_at ? fmtAgo(new Date(s.started_at)) : '')
    );

    row.append(top, meta);
    row.addEventListener('click', () => loadSessionHistory(s.agent, s.session_id));
    list.appendChild(row);
  });
}

async function loadSessionHistory(agent, id) {
  try {
    const r = await fetch(`/api/sessions/${agent}/${id}/history?last=100`);
    const events = await r.json();
    const feed = document.getElementById('feed');
    feed.innerHTML = '';
    eventLog = [];
    events.forEach(e => pushEvent({
      event_type: e.event_type,
      tool_name:  e.tool_name,
      cwd:        e.detail,
    }, new Date(e.timestamp)));
  } catch(err) {
    console.error('session history:', err);
  }
}

// ─── Daemon Info ──────────────────────────────────────────────────────────────
function renderDaemonInfo(info) {
  if (!info) return;
  const el2 = document.getElementById('header-info');
  const uptime = info.started_at ? fmtAgo(new Date(info.started_at)) : '';
  el2.textContent = `pid ${info.pid}  ·  ${info.rule_count} rules  ·  up ${uptime}`;
}

// ─── Interaction Modal ────────────────────────────────────────────────────────
function showInteraction(interaction) {
  if (activeInteraction) dismissInteraction('cancel');

  activeInteraction = interaction;

  document.getElementById('modal-title').textContent = 'Interaction Required';
  document.getElementById('modal-body').innerHTML = renderMarkdown(interaction.text || '');

  const input = document.getElementById('modal-input');
  input.style.display = interaction.type === 'freeform' ? 'block' : 'none';
  if (interaction.type === 'freeform') { input.value = ''; input.focus(); }

  const btns = document.getElementById('modal-buttons');
  btns.innerHTML = '';

  const buttonDefs = {
    'approve_deny_cancel': [
      { label: 'Approve', value: 'approve', cls: 'primary' },
      { label: 'Deny',    value: 'deny',    cls: 'danger'  },
      { label: 'Cancel',  value: 'cancel',  cls: ''        },
    ],
    'ok_cancel': [
      { label: 'OK',     value: 'ok',     cls: 'primary' },
      { label: 'Cancel', value: 'cancel', cls: ''        },
    ],
    'freeform': [
      { label: 'Submit', value: '__freeform__', cls: 'primary' },
      { label: 'Cancel', value: 'cancel',       cls: ''        },
    ],
  };

  const defs = buttonDefs[interaction.type] || buttonDefs['ok_cancel'];
  defs.forEach(({ label, value, cls }) => {
    const btn = document.createElement('button');
    btn.className = 'modal-btn ' + cls;
    btn.textContent = label;
    btn.onclick = () => {
      const v = value === '__freeform__' ? input.value : value;
      dismissInteraction(v);
    };
    btns.appendChild(btn);
  });

  // Countdown
  let remaining = interaction.timeout_sec || 30;
  updateTimer(remaining, interaction.default);
  clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    remaining--;
    if (remaining <= 0) {
      clearInterval(countdownTimer);
      dismissInteraction(interaction.default || 'cancel', true);
    } else {
      updateTimer(remaining, interaction.default);
    }
  }, 1000);

  document.getElementById('modal-overlay').classList.add('visible');

  // Web notification
  notifyInteraction(interaction);
}

function updateTimer(remaining, def) {
  document.getElementById('modal-timer').textContent =
    `Auto-${def || 'cancel'} in ${remaining}s`;
}

async function dismissInteraction(value, timedOut = false) {
  if (!activeInteraction) return;
  const id = activeInteraction.id;
  activeInteraction = null;
  clearInterval(countdownTimer);

  document.getElementById('modal-overlay').classList.remove('visible');
  document.getElementById('modal-timer').textContent = '';

  try {
    await fetch(`/api/interactions/${id}/respond`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, value, timed_out: timedOut }),
    });
  } catch(e) {
    console.error('interaction respond:', e);
  }
}

// Close modal on overlay click
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) {
    dismissInteraction('cancel');
  }
});

// ─── Search ───────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (searchVisible) hideSearch();
    else if (activeInteraction) dismissInteraction('cancel');
    return;
  }
  if (e.key === '/' && !searchVisible && !activeInteraction) {
    e.preventDefault();
    showSearch();
  }
});

document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Escape') { e.stopPropagation(); hideSearch(); }
  if (e.key === 'Enter')  { e.preventDefault(); runSearch(); }
});

function showSearch() {
  searchVisible = true;
  document.getElementById('search-bar').classList.add('visible');
  document.getElementById('search-input').focus();
}

function hideSearch() {
  searchVisible = false;
  document.getElementById('search-bar').classList.remove('visible');
  document.getElementById('search-results').innerHTML = '';
}

async function runSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;

  const resultsEl = document.getElementById('search-results');
  resultsEl.innerHTML = '<div style="color:var(--dim);padding:4px">Searching…</div>';

  try {
    const r = await fetch(`/api/search?collection=sessions&q=${encodeURIComponent(q)}&top_k=10`);
    if (!r.ok) {
      resultsEl.innerHTML = `<div style="color:var(--red)">Error: ${await r.text()}</div>`;
      return;
    }
    const results = await r.json();
    if (!results || results.length === 0) {
      resultsEl.innerHTML = '<div style="color:var(--dim);padding:4px">No results</div>';
      return;
    }
    resultsEl.innerHTML = '';
    results.forEach(r => {
      const div = document.createElement('div');
      div.className = 'search-result';
      const content = r.content.length > 200 ? r.content.slice(0, 200) + '…' : r.content;
      div.innerHTML = `
        <div><span class="search-score">score: ${r.score.toFixed(3)}</span>
             <span class="search-source">  ${shortSource(r.source)}</span></div>
        <div class="search-content">${escapeHtml(content)}</div>
      `;
      resultsEl.appendChild(div);
    });
  } catch(err) {
    resultsEl.innerHTML = `<div style="color:var(--red)">Error: ${err.message}</div>`;
  }
}

// ─── Notifications ────────────────────────────────────────────────────────────
function requestNotifications() {
  Notification.requestPermission().then(p => {
    if (p === 'granted') document.getElementById('notify-btn').classList.add('hidden');
  });
}

function notifyInteraction(interaction) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const n = new Notification('ragtime: Action Required', {
    body: (interaction.text || '').replace(/[#*`]/g, '').slice(0, 120),
    tag: 'ragtime-' + interaction.id,
    requireInteraction: true,
  });
  n.onclick = () => { window.focus(); n.close(); };
}

// Update notify button visibility
function updateNotifyBtn() {
  const btn = document.getElementById('notify-btn');
  if (!('Notification' in window) || Notification.permission === 'granted') {
    btn.classList.add('hidden');
  }
}

// ─── Markdown renderer ────────────────────────────────────────────────────────
function renderMarkdown(text) {
  // Escape HTML first, then apply markdown patterns
  let html = escapeHtml(text);

  // Code blocks (must come before inline code)
  html = html.replace(/```[^\n]*\n([\s\S]*?)```/g, '<pre><code>$1</code></pre>');

  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Bold
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm,   '<h1>$1</h1>');

  // Double newline → paragraph break
  html = html.replace(/\n\n+/g, '<br><br>');
  html = html.replace(/\n/g, '<br>');

  return html;
}

// ─── Utilities ────────────────────────────────────────────────────────────────
function el(tag, cls, text) {
  const e = document.createElement(tag || 'span');
  if (cls)  e.className = cls;
  if (text) e.textContent = text;
  return e;
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function fmtTime(d) {
  return d.toLocaleTimeString('en', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function fmtAgo(d) {
  const secs = Math.floor((Date.now() - d) / 1000);
  if (secs < 60)   return secs + 's ago';
  if (secs < 3600) return Math.floor(secs/60) + 'm ago';
  return Math.floor(secs/3600) + 'h ago';
}

function shortPath(path) {
  const parts = path.split('/').filter(Boolean);
  return parts.length > 2 ? parts.slice(-2).join('/') : path;
}

function shortSource(s) {
  const parts = s.split('/');
  return parts.length > 2 ? parts.slice(-2).join('/') : s;
}

// Auto-scroll detection
document.getElementById('feed').addEventListener('scroll', e => {
  const f = e.target;
  autoScroll = f.scrollTop + f.clientHeight >= f.scrollHeight - 10;
});

// ─── PWA ──────────────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

// ─── Init ─────────────────────────────────────────────────────────────────────
updateNotifyBtn();
connect();
</script>
</body>
</html>
